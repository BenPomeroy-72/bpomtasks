      if (!_dragTaskId || _dragTaskId === id) return;
      const isAbove = el.classList.contains('drop-above');
      const fromIdx = state.tasks.findIndex(t => t.id === _dragTaskId);
      if (fromIdx === -1) return;
      const [moved] = state.tasks.splice(fromIdx, 1);
      const newToIdx = state.tasks.findIndex(t => t.id === id);
      if (newToIdx === -1) { state.tasks.splice(fromIdx, 0, moved); return; }
      state.tasks.splice(isAbove ? newToIdx : newToIdx + 1, 0, moved);
      _dragTaskId = null;
      _lastDropEl = null;
      el.classList.remove('drop-above', 'drop-below');
      persist();
      render();
    });
  });

  document.querySelectorAll('[data-action="toggle"]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const container = el.closest('.task') || el.closest('.task-editor');
      const id = container.dataset.id || container.dataset.editor;
      const t = state.tasks.find(x => x.id === id);
      if (!t) return;
      if (t.completed || t.cancelled) {
        if (t.logged) {
          // In Logbook → reset back to open
          t.completed = false; t.cancelled = false; t.logged = false; t.completedAt = null;
        } else {
          // Completed-pending → log it
          t.logged = true;
        }
      } else {
        // Open → mark completed-pending (not yet logged)
        t.completed = true;
        t.logged = false;
        t.completedAt = Date.now();
        // If this task repeats, spawn the next occurrence
        if (t.repeat) spawnNextRepeat(t);
      }
      persist(); render();
    });
  });

  document.querySelectorAll('[data-log-all]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const pending = completedPendingTasksForView();
      if (!pending.length) return;
      pending.forEach(t => { t.logged = true; });
      persist();
      render();
    });
  });

  document.querySelectorAll('[data-add-on-date]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      createTaskOnDate(el.dataset.addOnDate);
    });
  });

  document.querySelectorAll('[data-action="logbook-delete"]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const container = el.closest('.task');
      if (!container) return;
      const id = container.dataset.id;
      const t = state.tasks.find(x => x.id === id);
      if (!t) return;
      if (confirm(`Delete "${t.title || '(untitled)'}" permanently?`)) {
        deleteTask(t);
      }
    });
  });

  document.querySelectorAll('.task-editor').forEach(editor => {
    const id = editor.dataset.editor;
    const t = state.tasks.find(x => x.id === id);
    if (!t) return;

    editor.querySelector('[data-edit="title"]').addEventListener('input', (e) => {
      t.title = e.target.value;
      persist();
    });
    editor.querySelector('[data-edit="title"]').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addTaskBelow(t); }
      if (e.key === 'Escape') { state.selectedId = null; render(); }
    });
    editor.querySelector('[data-edit="notes"]').addEventListener('input', (e) => {
      t.notes = e.target.value;
      e.target.style.height = 'auto';
      e.target.style.height = e.target.scrollHeight + 'px';
      persist();
    });
    const nt = editor.querySelector('[data-edit="notes"]');
    nt.style.height = 'auto';
    nt.style.height = nt.scrollHeight + 'px';

    editor.querySelectorAll('[data-cl-toggle]').forEach(cb => {
      cb.addEventListener('click', () => {
        const item = t.checklist.find(c => c.id === cb.dataset.clToggle);
        item.done = !item.done; persist(); render();
      });
    });
    editor.querySelectorAll('[data-cl-edit]').forEach(inp => {
      inp.addEventListener('input', () => {
        const item = t.checklist.find(c => c.id === inp.dataset.clEdit);
        item.title = inp.value; persist();
      });
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addChecklistItem(t); }
        if (e.key === 'Backspace' && !inp.value) {
          e.preventDefault();
          t.checklist = t.checklist.filter(c => c.id !== inp.dataset.clEdit);
          persist(); render();
        }
      });
    });

    editor.querySelectorAll('[data-link-slot]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (e.target.closest('[data-link-remove]')) return;
        e.stopPropagation();
        const slot = parseInt(btn.dataset.linkSlot, 10);
        if (btn.dataset.empty === 'true') {
          state.editingLink = { taskId: t.id, slot };
          render();
          setTimeout(() => {
            const inp = document.querySelector(`.task-editor[data-editor="${t.id}"] [data-link-edit-input]`);
            if (inp) inp.focus();
          }, 30);
        } else {
          const url = btn.dataset.url;
          if (url) window.open(url, '_blank', 'noopener,noreferrer');
        }
      });
    });

    editor.querySelectorAll('[data-link-remove]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const slot = parseInt(btn.dataset.linkRemove, 10);
        if (!t.links || !t.links.length) return;
        const url = t.links[slot];
        if (url) {
          // Filled slot: just clear the URL, keep the slot
          t.links[slot] = null;
        } else {
          // Empty slot: remove the slot entirely (but never go below 1)
          if (t.links.length > 1) t.links.splice(slot, 1);
        }
        persist(); render();
      });
    });

    const addLinkBtn = editor.querySelector('[data-link-add]');
    if (addLinkBtn) {
      addLinkBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!t.links || !t.links.length) t.links = [null];
        if (t.links.length < 5) {
          t.links.push(null);
          persist(); render();
        }
      });
    }

    const linkInput = editor.querySelector('[data-link-edit-input]');
    if (linkInput) {
      const saveLink = () => {
        if (!state.editingLink) return;
        const slot = state.editingLink.slot;
        const value = linkInput.value.trim();
        if (!t.links || !t.links.length) t.links = [null];
        while (t.links.length <= slot) t.links.push(null);
        t.links[slot] = value || null;
        state.editingLink = null;
        persist(); render();
      };
      linkInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveLink(); }
        else if (e.key === 'Escape') { e.preventDefault(); state.editingLink = null; render(); }
      });
      const saveBtn = editor.querySelector('[data-link-edit-save]');
      if (saveBtn) saveBtn.addEventListener('click', (e) => { e.stopPropagation(); saveLink(); });
      const cancelBtn = editor.querySelector('[data-link-edit-cancel]');
      if (cancelBtn) cancelBtn.addEventListener('click', (e) => { e.stopPropagation(); state.editingLink = null; render(); });
    }

    editor.querySelectorAll('[data-action]').forEach(btn => {
      const action = btn.dataset.action;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (action === 'toggle') return;
        if (action === 'when')      openPicker(btn, t, 'when');
        if (action === 'deadline')  openPicker(btn, t, 'deadline');
        if (action === 'checklist') addChecklistItem(t);
        if (action === 'remove-checklist') {
          t.checklist = [];
          persist(); render();
        }
        if (action === 'status')    openPicker(btn, t, 'status');
        if (action === 'tags')      openPicker(btn, t, 'tags');
        if (action === 'color')     openPicker(btn, t, 'color');
        if (action === 'project')   openPicker(btn, t, 'project');
        if (action === 'schedule')  openCalendarModal(t);
        if (action === 'more')      openPicker(btn, t, 'more');
        if (action === 'delete')    deleteTask(t);
        if (action === 'add-checklist-item') addChecklistItem(t);
      });
    });
  });
}

function attachHeaderEditors() {
  if (state.view.kind !== 'project') return;
  const p = state.projects.find(x => x.id === state.view.projectId);
  const titleEl = document.querySelector('[data-edit="project-title"]');
  const notesEl = document.querySelector('[data-edit="project-notes"]');
  if (titleEl) {
    titleEl.addEventListener('blur', () => { p.title = titleEl.innerText.trim(); persist(); renderSidebar(); });
    titleEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
  }
  if (notesEl) {
    notesEl.addEventListener('input', () => { p.notes = notesEl.value; persist(); });
  }
}

function openPicker(anchor, task, kind) {
  closePicker();
  const picker = document.createElement('div');
  picker.className = 'picker';
  document.body.appendChild(picker);

  let rows = '';
  if (kind === 'when' || kind === 'deadline') {
    rows = `
      <div class="picker-row" data-set="${todayStr()}">
        <span class="left"><span class="ico" style="color:var(--accent-today)">${ICONS.today}</span> Today</span>
        <span class="hint">⌘T</span>
      </div>
      <div class="picker-row" data-set="${dayOffset(1)}">
        <span class="left"><span class="ico" style="color:var(--accent-someday)">${ICONS.calendar}</span> Tomorrow</span>
      </div>
      <div class="picker-row" data-set="${dayOffset(7)}">
        <span class="left"><span class="ico" style="color:var(--accent-upcoming)">${ICONS.calendar}</span> Next Week</span>
      </div>`;
    if (kind === 'when') {
      rows += `<div class="picker-row" data-set="someday">
        <span class="left"><span class="ico" style="color:var(--accent-someday)">${ICONS.someday}</span> Someday</span>
      </div>`;
    }
    rows += `<div class="picker-sep"></div>
      <div class="picker-row" style="display:block">
        <input type="date" data-date-pick style="background:var(--bg-elevated); border:1px solid var(--border); border-radius:6px; padding:6px 9px; color:var(--text); width:100%; font-size:15.5px;" />
      </div>`;
    if (task[kind]) {
      rows += `<div class="picker-sep"></div>
        <div class="picker-row" data-set="__clear" style="color:var(--danger)">
          <span class="left">Clear</span>
        </div>`;
    }
  } else if (kind === 'project') {
    rows = `<div class="picker-row" data-set-project="__none">
      <span class="left">No List</span>
    </div><div class="picker-sep"></div>` +
    state.projects.map(p => `
      <div class="picker-row" data-set-project="${p.id}">
        <span class="left"><span class="project-dot" style="color:${PROJ_COLORS[p.color]}"></span> ${escape(p.title)}</span>
      </div>`).join('');
  } else if (kind === 'color') {
    const swatches = TASK_COLORS.map(c =>
      `<span class="color-swatch ${c} ${task.color===c?'selected':''}" data-set-color="${c}" title="${TASK_COLOR_LABEL[c]}"></span>`
    ).join('');
    rows = `<div class="swatch-row">${swatches}<span class="color-swatch none ${!task.color?'selected':''}" data-set-color="__clear" title="No color"></span></div>`;
  } else if (kind === 'status') {
    const opts = ['>', '•', '!', '!!!'];
    rows = `<div class="swatch-row">${opts.map(s =>
      `<button class="status-pick ${task.status===s?'selected':''}" data-set-status="${escape(s)}">${escape(s)}</button>`
    ).join('')}</div>`;
    if (task.status) {
      rows += `<div class="picker-sep"></div>
        <div class="picker-row" data-set-status="__clear" style="color:var(--danger)">
          <span class="left">Clear status</span>
        </div>`;
    }
  } else if (kind === 'tags') {
    const allTags = [...new Set(state.tasks.flatMap(t => t.tags || []))].sort();
    const current = task.tags || [];
    const chips = allTags.length
      ? `<div class="picker-tag-grid">${allTags.map(tag => {
          const sel = current.includes(tag);
          return `<span class="picker-tag-chip ${sel ? 'selected' : ''}" data-toggle-tag="${escape(tag)}">${escape(tag)}<span class="picker-tag-remove" data-remove-tag="${escape(tag)}" title="Delete tag from all tasks">×</span></span>`;
        }).join('')}</div>`
      : '';
    rows = `${chips}${allTags.length ? `<div class="picker-sep"></div>` : ''}
      <div style="padding: 6px 8px;">
        <input type="text" placeholder="Type a tag, press Enter…" data-tag-input style="background:var(--bg-elevated); border:1px solid var(--border); border-radius:6px; padding:7px 10px; color:var(--text); width:100%; font-size:14px; font-family: var(--font-ui);" />
      </div>`;
  } else if (kind === 'more') {
    const repeatLabel = task.repeat ? repeatShortLabel(task.repeat) : 'Off';
    rows = `
      <div class="picker-row" data-set-more="duplicate">
        <span class="left">Duplicate</span>
      </div>
      <div class="picker-sep"></div>
      <div class="picker-row" data-set-more="repeat">
        <span class="left">Repeat</span>
        <span class="hint">${repeatLabel}</span>
      </div>`;
  }
  picker.innerHTML = rows;

  const r = anchor.getBoundingClientRect();
  picker.style.left = r.left + 'px';
  picker.style.top  = (r.bottom + 6) + 'px';
  requestAnimationFrame(() => {
    const pr = picker.getBoundingClientRect();
    if (pr.right > window.innerWidth - 8) picker.style.left = (window.innerWidth - pr.width - 8) + 'px';
    if (pr.bottom > window.innerHeight - 8) picker.style.top = (r.top - pr.height - 6) + 'px';
  });

  picker.querySelectorAll('[data-set]').forEach(el => {
    el.addEventListener('click', () => {
      const v = el.dataset.set;
      task[kind] = v === '__clear' ? null : v;
      closePicker(); persist(); render();
    });
  });
  picker.querySelectorAll('[data-set-project]').forEach(el => {
    el.addEventListener('click', () => {
      task.projectId = el.dataset.setProject === '__none' ? null : el.dataset.setProject;
      closePicker(); persist(); render();
    });
  });
  picker.querySelectorAll('[data-set-color]').forEach(el => {
    el.addEventListener('click', () => {
      task.color = el.dataset.setColor === '__clear' ? null : el.dataset.setColor;
      closePicker(); persist(); render();
    });
  });
  picker.querySelectorAll('[data-set-status]').forEach(el => {
    el.addEventListener('click', () => {
      task.status = el.dataset.setStatus === '__clear' ? null : el.dataset.setStatus;
      closePicker(); persist(); render();
    });
  });

  picker.querySelectorAll('[data-set-more]').forEach(el => {
    el.addEventListener('click', (e) => {
      const choice = el.dataset.setMore;
      if (choice === 'duplicate') {
        closePicker();
        duplicateTask(task);
      } else if (choice === 'repeat') {
        closePicker();
        openRepeatModal(task);
      }
    });
  });

  // Toggle existing tag chips (picker stays open for multi-select)
  picker.querySelectorAll('[data-toggle-tag]').forEach(el => {
    el.addEventListener('click', (e) => {
      // Ignore clicks on the × inside the chip — handled separately
      if (e.target.closest('[data-remove-tag]')) return;
      const tag = el.dataset.toggleTag;
      if (!task.tags) task.tags = [];
      const idx = task.tags.indexOf(tag);
      if (idx >= 0) task.tags.splice(idx, 1);
      else task.tags.push(tag);
      el.classList.toggle('selected', task.tags.includes(tag));
      persist();
      renderView();
    });
  });

  // Delete a tag globally (remove from every task)
  picker.querySelectorAll('[data-remove-tag]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const tag = el.dataset.removeTag;
      state.tasks.forEach(t => {
        if (t.tags && t.tags.includes(tag)) {
          t.tags = t.tags.filter(x => x !== tag);
        }
      });
      persist();
      // Remove the chip from the picker DOM
      const chip = el.closest('.picker-tag-chip');
      if (chip) chip.remove();
      renderView();
    });
  });

  const tagInput = picker.querySelector('[data-tag-input]');
  if (tagInput) {
    setTimeout(() => tagInput.focus(), 60);
    tagInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = tagInput.value.trim().replace(/[,#\s]+/g, '_');
        if (val) {
          if (!task.tags) task.tags = [];
          if (!task.tags.includes(val)) task.tags.push(val);
          tagInput.value = '';
          persist();
          closePicker();
          render();
        }
      }
    });
  }
  const dp = picker.querySelector('[data-date-pick]');
  if (dp) {
    dp.value = (task[kind] && task[kind] !== 'someday') ? task[kind] : todayStr();
    dp.addEventListener('change', () => {
      task[kind] = dp.value;
      closePicker(); persist(); render();
    });
  }

  setTimeout(() => document.addEventListener('mousedown', dismissPicker), 0);
}
function dismissPicker(e) {
  if (e.target.closest('.picker')) return;
  closePicker();
}
function closePicker() {
  document.querySelectorAll('.picker').forEach(p => p.remove());
  document.removeEventListener('mousedown', dismissPicker);
}

function addChecklistItem(task) {
  if (!task.checklist) task.checklist = [];
  task.checklist.push({ id: uid(), title: '', done: false });
  persist(); render();
  setTimeout(() => {
    const inputs = document.querySelectorAll(`.task-editor[data-editor="${task.id}"] [data-cl-edit]`);
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 40);
}

function addTaskBelow(refTask) {
  const t = newBlankTask();
  const idx = state.tasks.findIndex(x => x.id === refTask.id);
  state.tasks.splice(idx + 1, 0, t);
  state.selectedId = t.id;
  persist(); render();
  setTimeout(() => {
    const inp = document.querySelector(`.task-editor[data-editor="${t.id}"] [data-edit="title"]`);
    if (inp) inp.focus();
  }, 40);
}

function newBlankTask() {
  const v = state.view;
  const t = {
    id: uid(), title: '', notes: '', when: null, deadline: null,
    projectId: null, tags: [], checklist: [], links: [null],
    completed: false, cancelled: false, logged: false,
    createdAt: Date.now()
  };
  if (v.kind === 'today') t.when = todayStr();
  else if (v.kind === 'someday') t.when = 'someday';
  else if (v.kind === 'project') t.projectId = v.projectId;
  return t;
}

function createNewTask() {
  const t = newBlankTask();
  state.tasks.push(t);
  state.selectedId = t.id;
  persist(); render();
  setTimeout(() => {
    const inp = document.querySelector(`.task-editor[data-editor="${t.id}"] [data-edit="title"]`);
    if (inp) inp.focus();
    const editor = document.querySelector(`.task-editor[data-editor="${t.id}"]`);
    if (editor) editor.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 40);
}

function createTaskOnDate(dateStr) {
  const t = newBlankTask();
  t.when = dateStr;
  state.tasks.push(t);
  state.selectedId = t.id;
  persist(); render();
  setTimeout(() => {
    const inp = document.querySelector(`.task-editor[data-editor="${t.id}"] [data-edit="title"]`);
    if (inp) inp.focus();
    const editor = document.querySelector(`.task-editor[data-editor="${t.id}"]`);
    if (editor) editor.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 40);
}

function deleteTask(task) {
  state.tasks = state.tasks.filter(t => t.id !== task.id);
  state.selectedId = null;
  persist(); render();
}

function duplicateTask(t) {
  const copy = JSON.parse(JSON.stringify(t));
  copy.id = uid();
  copy.completed = false;
  copy.cancelled = false;
  copy.logged = false;
  copy.completedAt = null;
  copy.createdAt = Date.now();
  // Give checklist items fresh ids too
  if (copy.checklist && copy.checklist.length) {
    copy.checklist = copy.checklist.map(c => ({ ...c, id: uid() }));
  }
  const idx = state.tasks.findIndex(x => x.id === t.id);
  state.tasks.splice(idx + 1, 0, copy);
  state.selectedId = copy.id;
  persist(); render();
}

function spawnNextRepeat(t) {
  if (!t.repeat || typeof t.repeat !== 'object') return;
  const r = t.repeat;
  const count = Math.max(1, r.count || 1);
  const unit = r.unit || 'week';

  let baseDate;
  if (r.mode === 'after-completion') {
    baseDate = new Date(); baseDate.setHours(0,0,0,0);
  } else {
    // Schedule mode: advance from the task's current when date
    if (!t.when || t.when === 'someday') return;
    baseDate = new Date(t.when + 'T00:00:00');
  }
  if (unit === 'day')        baseDate.setDate(baseDate.getDate() + count);
  else if (unit === 'week')  baseDate.setDate(baseDate.getDate() + count * 7);
  else if (unit === 'month') baseDate.setMonth(baseDate.getMonth() + count);
  else if (unit === 'year')  baseDate.setFullYear(baseDate.getFullYear() + count);

  const next = JSON.parse(JSON.stringify(t));
  next.id = uid();
  next.completed = false;
  next.cancelled = false;
  next.logged = false;
  next.completedAt = null;
  next.createdAt = Date.now();
  if (next.checklist && next.checklist.length) {
    next.checklist = next.checklist.map(c => ({ ...c, id: uid(), done: false }));
  }
  next.when = baseDate.toISOString().slice(0, 10);
  state.tasks.push(next);
}

function repeatShortLabel(r) {
  if (!r || typeof r !== 'object') return 'Off';
  const count = r.count || 1;
  const unit = r.unit || 'week';
  const unitLabel = count === 1 ? unit : unit + 's';
  const prefix = count === 1 ? `every ${unitLabel}` : `every ${count} ${unitLabel}`;
  return r.mode === 'after-completion' ? `${prefix} (after done)` : prefix;
}

function openRepeatModal(task) {
  closePicker();
  const initial = (task.repeat && typeof task.repeat === 'object')
    ? task.repeat
    : { mode: 'after-completion', count: 1, unit: 'week' };
  const initialMode = task.repeat ? initial.mode : 'off';

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" role="dialog" aria-label="Repeat settings">
      <div class="modal-row">
        <span class="modal-label">Repeat</span>
        <select data-repeat-mode>
          <option value="off">off</option>
          <option value="after-completion">after completion</option>
          <option value="schedule">on a schedule</option>
        </select>
      </div>
      <div class="modal-card" data-card>
        <input type="number" min="1" max="99" data-repeat-count value="${initial.count}" />
        <select data-repeat-unit>
          <option value="day">day</option>
          <option value="week">week</option>
          <option value="month">month</option>
          <option value="year">year</option>
        </select>
        <span class="modal-explainer" data-repeat-explainer></span>
      </div>
      <div class="modal-footer">
        <button class="modal-btn cancel" data-modal-cancel>Cancel</button>
        <button class="modal-btn ok" data-modal-ok>OK</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const modeSel = overlay.querySelector('[data-repeat-mode]');
  const countInp = overlay.querySelector('[data-repeat-count]');
  const unitSel = overlay.querySelector('[data-repeat-unit]');
  const card = overlay.querySelector('[data-card]');
  const explainer = overlay.querySelector('[data-repeat-explainer]');
  modeSel.value = initialMode;
  unitSel.value = initial.unit;

  const updateExplainer = () => {
    const m = modeSel.value;
    if (m === 'off') {
      card.classList.add('disabled');
      explainer.textContent = 'Repeat is turned off.';
    } else {
      card.classList.remove('disabled');
      explainer.textContent = (m === 'after-completion')
        ? 'after the task is checked off.'
        : 'on a schedule, starting from the task date.';
    }
  };
  modeSel.addEventListener('change', updateExplainer);
  updateExplainer();

  const close = () => {
    overlay.remove();
    document.removeEventListener('keydown', onKey);
  };
  const onKey = (e) => {
    if (e.key === 'Escape') close();
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
  };
  document.addEventListener('keydown', onKey);

  const commit = () => {
    if (modeSel.value === 'off') {
      task.repeat = null;
    } else {
      task.repeat = {
        mode: modeSel.value,
        count: Math.max(1, Math.min(99, parseInt(countInp.value, 10) || 1)),
        unit: unitSel.value
      };
    }
    persist();
    close();
    render();
  };

  overlay.querySelector('[data-modal-ok]').addEventListener('click', commit);
  overlay.querySelector('[data-modal-cancel]').addEventListener('click', close);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
}

function openCalendarModal(task) {
  closePicker();
  let duration = 30;           // minutes
  let dateMode = 'today';      // 'today' | 'tomorrow' | 'custom'
  let customDate = todayStr();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" role="dialog" aria-label="Schedule to calendar">
      <div class="modal-row">
        <span class="modal-label">Add to Google Calendar</span>
      </div>

      <div>
        <div class="modal-section-label">Duration</div>
        <div class="modal-options" data-duration-group>
          <button class="modal-option" data-duration="5">5 min</button>
          <button class="modal-option" data-duration="15">15 min</button>
          <button class="modal-option selected" data-duration="30">30 min</button>
          <button class="modal-option" data-duration="60">1 hour</button>
          <button class="modal-option" data-duration="120">2 hours</button>
        </div>
      </div>

      <div>
        <div class="modal-section-label">Date</div>
        <div class="modal-options" data-date-group>
          <button class="modal-option selected" data-when="today">Today</button>
          <button class="modal-option" data-when="tomorrow">Tomorrow</button>
          <button class="modal-option" data-when="custom">Custom</button>
        </div>
        <div class="modal-custom-date" data-custom-wrap>
          <input type="date" data-custom-date value="${todayStr()}" />
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-btn cancel" data-modal-cancel>Cancel</button>
        <button class="modal-btn ok" data-modal-ok>Add to Calendar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const durGroup = overlay.querySelector('[data-duration-group]');
  const dateGroup = overlay.querySelector('[data-date-group]');
  const customWrap = overlay.querySelector('[data-custom-wrap]');
  const customInput = overlay.querySelector('[data-custom-date]');

  durGroup.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-duration]');
    if (!btn) return;
    duration = parseInt(btn.dataset.duration, 10);
    durGroup.querySelectorAll('.modal-option').forEach(b => b.classList.toggle('selected', b === btn));
  });

  dateGroup.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-when]');
    if (!btn) return;
    dateMode = btn.dataset.when;
    dateGroup.querySelectorAll('.modal-option').forEach(b => b.classList.toggle('selected', b === btn));
    customWrap.classList.toggle('show', dateMode === 'custom');
  });

  customInput.addEventListener('change', () => { customDate = customInput.value || todayStr(); });

  const close = () => {
    overlay.remove();
    document.removeEventListener('keydown', onKey);
  };
  const onKey = (e) => {
    if (e.key === 'Escape') close();
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
  };
  document.addEventListener('keydown', onKey);

  const commit = () => {
    let dateStr;
    if (dateMode === 'today') dateStr = todayStr();
    else if (dateMode === 'tomorrow') dateStr = dayOffset(1);
    else dateStr = customDate;

    // Build start (4am local) and end (start + duration minutes)
    const start = new Date(dateStr + 'T04:00:00');
    const end = new Date(start.getTime() + duration * 60 * 1000);

    const fmtLocal = (d) => {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    };

    const title = `bpomT - ${task.title || 'Untitled task'}`;
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';

    // Build the event details: notes + any saved links
    const parts = [];
    if (task.notes && task.notes.trim()) parts.push(task.notes.trim());
    const links = (task.links || []).filter(u => u && u.trim());
    if (links.length) {
      const linkLines = links.map(u => `• ${linkType(u)}: ${u}`).join('\n');
      parts.push('Links:\n' + linkLines);
    }
    const details = parts.join('\n\n');
    const url = 'https://calendar.google.com/calendar/render'
      + '?action=TEMPLATE'
      + '&text=' + encodeURIComponent(title)
      + '&dates=' + fmtLocal(start) + '/' + fmtLocal(end)
      + '&ctz=' + encodeURIComponent(tz)
      + (details ? '&details=' + encodeURIComponent(details) : '');

    window.open(url, '_blank', 'noopener,noreferrer');
    task.scheduled = true;
    persist();
    close();
    render();
  };

  overlay.querySelector('[data-modal-ok]').addEventListener('click', commit);
  overlay.querySelector('[data-modal-cancel]').addEventListener('click', close);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
}

function addNewProject(areaId = null) {
  const colorKeys = Object.keys(PROJ_COLORS);
  const color = colorKeys[state.projects.length % colorKeys.length];
  const defaultTitle = areaId ? 'New Project' : 'New List';
  const p = { id: uid(), title: defaultTitle, areaId: areaId || null, color, notes: '' };
  state.projects.push(p);
  state.view = { kind: 'project', projectId: p.id };
  state.selectedId = null;
  persist(); render();
  setTimeout(() => {
    const titleEl = document.querySelector('[data-edit="project-title"]');
    if (titleEl) {
      titleEl.focus();
      const range = document.createRange();
      range.selectNodeContents(titleEl);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    }
  }, 40);
}

document.getElementById('magic-plus').addEventListener('click', createNewTask);

document.getElementById('search').addEventListener('input', (e) => {
  state.search = e.target.value;
  renderView();
});

document.getElementById('sort-btn').addEventListener('click', (e) => {
  openSortMenu(e.currentTarget);
});

function openSortMenu(anchor) {
  closePicker();
  const picker = document.createElement('div');
  picker.className = 'picker';
  document.body.appendChild(picker);

  const opts = [
    { value: 'default', label: 'Default' },
    { value: 'color',   label: 'Color' },
    { value: 'project', label: 'Project' },
    { value: 'tag',     label: 'Tag' }
  ];

  picker.innerHTML = opts.map(o => `
    <div class="picker-row" data-set-sort="${o.value}">
      <span class="left">${o.label}</span>
      ${state.sortBy === o.value ? '<span class="hint">✓</span>' : ''}
    </div>`).join('');

  const r = anchor.getBoundingClientRect();
  picker.style.left = r.left + 'px';
  picker.style.top = (r.bottom + 6) + 'px';
  requestAnimationFrame(() => {
    const pr = picker.getBoundingClientRect();
    if (pr.right > window.innerWidth - 8) picker.style.left = (window.innerWidth - pr.width - 8) + 'px';
  });

  picker.querySelectorAll('[data-set-sort]').forEach(el => {
    el.addEventListener('click', () => {
      state.sortBy = el.dataset.setSort;
      closePicker();
      updateSortBtn();
      renderView();
    });
  });

  setTimeout(() => document.addEventListener('mousedown', dismissPicker), 0);
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  try { localStorage.setItem('threads-theme', state.theme); } catch (_) {}
  applyTheme();
});

function updateSortBtn() {
  const btn = document.getElementById('sort-btn');
  const lbl = document.getElementById('sort-label');
  if (state.sortBy === 'default' || !state.sortBy) {
    btn.classList.remove('active');
    lbl.textContent = 'Sort';
  } else {
    btn.classList.add('active');
    const labels = { color: 'Color', project: 'Project', tag: 'Tag' };
    lbl.textContent = `Sort: ${labels[state.sortBy] || state.sortBy}`;
  }
}

document.addEventListener('keydown', (e) => {
  const meta = e.metaKey || e.ctrlKey;
  if (meta && e.key.toLowerCase() === 'n') { e.preventDefault(); createNewTask(); }
  if (meta && e.key.toLowerCase() === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'Escape') {
    if (document.querySelector('.picker')) { closePicker(); }
    else if (state.selectedId) { state.selectedId = null; render(); }
  }
});

document.addEventListener('click', (e) => {
  if (!state.selectedId) return;
  if (e.target.closest('.task-editor')) return;
  if (e.target.closest('.task')) return;
  if (e.target.closest('.picker')) return;
  if (e.target.closest('.magic-plus')) return;
  if (e.target.closest('.topbar')) return;
  state.selectedId = null;
  state.editingLink = null;
  render();
});

function applyTheme() {
  const isLight = state.theme === 'light';
  document.body.classList.toggle('light', isLight);
  const icon = document.getElementById('theme-icon');
  if (icon) icon.innerHTML = isLight ? THEME_ICONS.moon : THEME_ICONS.sun;
}

function render() {
  closePicker();
  renderSidebar();
  renderView();
}

applyTheme();
updateSortBtn();
render();
</script>

</body>
</html>
